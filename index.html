
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NSRIT Student Login</title>

  <link rel="stylesheet" href="nsrit.css">
</head>
<body>

  <div> 

  <!-- Main Container -->
  <div class="container">
     
    
       
    <!-- Top Banner -->
    <div class="top-banner">
      <img src="banner.png" alt="College Banner">
    </div>

    <!-- College Image -->
    <div class="college-image">
      <img src="building.png" alt="College Building">
    </div>

    <!-- Welcome Text -->
    <div class="welcome-text" >
      Welcome to Freshers
    </div>

    <!-- Login Section -->
    <div class="login-section">

      <!-- Employee Login -->
      <div class="login-box">

        <div class="login-header">
          Employee Login
        </div>

        <div class="login-content">

          <label>User Name :</label>
          <input type="text">

          <label>Password :</label>
          <input type="password">

          <button>LOGIN</button>

        </div>

      </div>

      <!-- Student Login -->
      <div class="login-box">

        <div class="login-header">
          Student Login
        </div>

        <div class="login-content">

          <label>User Name :</label>
          <input type="text">

          <label>Password :</label>
          <input type="password">

          <button>LOGIN</button>

        </div>

      </div>

    </div>
  </div>
    

    <!-- Footer -->
    <div class="footer">
      Copyright © All rights reserved
    </div>

  </div>

</body>
</html>
